# ============================================
# qq-agent-bridge 配置文件
# 复制为 config.yaml 后编辑，或直接通过 WebUI 配置
# ============================================

# ── OneBot 入口（NapCat 连过来的）──────────────
onebot:
  ws_host: "0.0.0.0"
  ws_port: 8080
  ws_path: "/onebot/v11/ws"
  access_token: "CHANGE_THIS_TOKEN"   # 跟 NapCat websocketClients.token 一致
  self_id: "12345678"                 # 机器人自己的 QQ 号

# ── 后端 AI 选择 ────────────────────────────
# 支持: hermes | openclaw
# 两个都是"远程后端"——只需要 URL + 秘钥/密码，不用在本机装
backend: "hermes"

# ── 各后端具体配置（只用到的会生效）────────
backends:

  # ── Hermes（远程 Gateway HTTP API）────────
  # Hermes 部署后开启 api_server 平台即可，文档:
  #   https://hermes-agent.nousresearch.com/docs/gateway/platforms/api-server
  hermes:
    base_url: "http://your-hermes-host:8642/v1"
    api_key: "${HERMES_API_KEY}"        # 支持 ${ENV_VAR} 引用
    model: "hermes-agent"
    system_prompt: "你是一个 QQ 助手，回答要简洁。"
    temperature: 0.7
    max_tokens: 2000
    timeout: 120

  # ── OpenClaw（远程 Gateway HTTP API）──────
  # OpenClaw 需要在 gateway.http.endpoints.chatCompletions.enabled 开启，文档:
  #   https://docs.openclaw.ai/gateway/openai-http-api
  openclaw:
    base_url: "http://your-openclaw-host:PORT"   # 自动补 /v1
    api_key: "${OPENCLAW_TOKEN}"                 # gateway.auth.token 或 .password
    model: "openclaw"                            # 默认 agent；指定 agent 用 "openclaw/<agentId>"
    system_prompt: ""                            # 留空，OpenClaw agent 自己有 system prompt
    temperature: 0.7
    max_tokens: 4000
    timeout: 120

# ── 权限：白名单 / 黑名单 ────────────────────
permissions:
  owners: ["10086"]                     # 主人 QQ（拥有全部权限）

  allow_all: false                      # 是否允许所有人调用
  whitelist_users: []
  whitelist_groups: []

  blacklist_users: []                   # 黑名单（优先级最高）
  blacklist_groups: []

  group_require_at: true                # 群里是否必须 @ 才回复

# ── 会话隔离 ──────────────────────────────
session:
  scope: "per_chat"                     # per_user | per_group | per_chat
  timeout: 1800                         # 会话超时（秒）
  history_turns: 10                     # 每个会话保留的对话轮数

# ── 高级 ──────────────────────────────────
advanced:
  rate_limit_seconds: 1                 # 防刷屏
  max_concurrent: 5                     # 最大并发
  long_output: "split"                  # truncate | split | file
  long_output_threshold: 2000
  log_level: "INFO"

# ── WebUI 仪表盘 ────────────────────────────
webui:
  username: "admin"
  password: "admin"                     # 生产环境务必改掉
